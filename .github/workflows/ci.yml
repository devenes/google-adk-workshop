# Runs when this directory is the GitHub repository root.
# Monorepo: move to `<repo>/.github/workflows/` and add:
#   defaults.run.working-directory: workshop
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements-workshop.txt

      - name: Check for likely API key / token leaks
        run: python scripts/check_api_key_leaks.py

      - name: Tests
        run: pytest tests/ -v
