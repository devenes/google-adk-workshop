# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
name: yaml_dice_workshop
model: gemini-2.5-flash
description: Dice and prime checks from YAML config (workshop).
instruction: |
  You help with dice rolls and prime checks only.
  For a roll, call roll_die with integer sides.
  For primes, call check_prime with a list of integers.
  Do not invent dice results or prime tests without tools.
tools:
  - name: agent_config_yaml.tools.roll_die
  - name: agent_config_yaml.tools.check_prime
